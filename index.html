    <script>
        // [00] 빌드/캐시 버전과 파일별 자산 버전
        window.NEXUS_BUILD_VERSION = "nex-2607201000";
        window.APP_VERSION = "nex-2607201000";
        window.NEXUS_ASSET_VERSIONS = {
            "app.js": "nex-2607201000",
            "config.js": "nex-2607201000",
            "style.css": "nex-2607201000",
            "data.js": "nex-2607201000"
        };
        window.NEXUS_STORAGE_KEYS = {
            saveData: "nexusSaveData",
            favorites: "nexusFavorites",
            fontScale: "nexusFontScale"
        };
        window.nexusAssetVersion = function(key){
            var versions = window.NEXUS_ASSET_VERSIONS || {};
            return versions[key] || window.NEXUS_BUILD_VERSION || 'dev';
        };
        window.nexusAssetUrl = function(src, key){
            var version = window.nexusAssetVersion(key || src.replace(/^\.\//, ''));
            var separator = src.indexOf('?') === -1 ? '?' : '&';
            return src + separator + 'v=' + encodeURIComponent(version);
        };
        window.nexusCleanUpdateParams = function(){
            if(!window.location || !window.history || !window.history.replaceState) return;
            try{
                var url = new URL(window.location.href);
                var changed = false;
                ['fresh','__nexus_check'].forEach(function(name){
                    if(url.searchParams.has(name)){
                        url.searchParams.delete(name);
                        changed = true;
                    }
                });
                if(changed) window.history.replaceState(null, document.title || '', url.pathname + url.search + url.hash);
            }catch(e){}
        };
        window.nexusCheckIndexUpdate = function(){
            if(!window.fetch || !window.location || window.location.protocol === 'file:') return;
            var current = window.NEXUS_BUILD_VERSION || window.APP_VERSION || '';
            var url = new URL(window.location.href);
            url.searchParams.set('__nexus_check', String(Date.now()));
            fetch(url.href, { cache:'no-store' }).then(function(res){
                if(!res.ok) return '';
                return res.text();
            }).then(function(html){
                var match = String(html || '').match(/window\.(?:NEXUS_BUILD_VERSION|APP_VERSION)\s*=\s*["']([^"']+)["']/);
                var latest = match && match[1];
                if(!latest || latest === current) return;
                var key = 'nexus-auto-refresh:' + latest;
                try{
                    if(sessionStorage.getItem(key) === '1') return;
                    sessionStorage.setItem(key, '1');
                }catch(e){}
                var next = new URL(window.location.href);
                next.searchParams.set('fresh', latest);
                next.searchParams.delete('__nexus_check');
                window.location.replace(next.href);
            }).catch(function(){});
        };
        window.nexusCleanUpdateParams();
        setTimeout(window.nexusCheckIndexUpdate, 1200);
        window.addEventListener('focus', window.nexusCheckIndexUpdate);
        document.addEventListener('visibilitychange', function(){
            if(!document.hidden) window.nexusCheckIndexUpdate();
        });
        setInterval(window.nexusCheckIndexUpdate, 180000);
    </script>

        html.nexus-boot-error #nexusBootScreen .boot-card{border-color:#7f1d2d;background:#2b1017;}

    <script>
        (function(){
            function copyTextFallback(text){
                var area=document.createElement('textarea');
                area.value=text;
                area.setAttribute('readonly','');
                area.style.position='fixed';
                area.style.left='-9999px';
                document.body.appendChild(area);
                area.select();
                try{document.execCommand('copy');}catch(e){}
                area.remove();
            }
            window.nexusCopyBootErrorCode=function(code, btn){
                var done=function(){ if(btn){ var old=btn.textContent; btn.textContent='복사됨'; setTimeout(function(){btn.textContent=old;},1200); } };
                if(navigator.clipboard && window.isSecureContext){
                    navigator.clipboard.writeText(code).then(done).catch(function(){ copyTextFallback(code); done(); });
                }else{
                    copyTextFallback(code); done();
                }
            };
            window.nexusShowBootError=function(code, err){
                window.__nexusBootError=true;
                try{window.NEXUS_LAST_BOOT_ERROR={code:code,error:err||'unknown',time:Date.now()};}catch(e){}
                try{
                    document.documentElement.classList.add('nexus-booting','nexus-boot-error');
                    var boot=document.getElementById('nexusBootScreen');
                    if(boot){
                        boot.removeAttribute('aria-hidden');
                        boot.innerHTML='<div class="boot-card"><div class="boot-title">넥서스 초기화에 실패했습니다</div><div class="boot-desc">새로고침 후에도 반복되면 제작자에게 아래 오류코드를 전달해주세요.</div><div class="boot-error-code" aria-label="오류코드">'+code+'</div><div class="boot-actions"><button class="boot-action-btn" id="nexusBootCopyBtn" type="button">오류코드 복사</button><button class="boot-action-btn primary" type="button" onclick="window.location.reload()">새로고침</button></div></div>';
                        var copyBtn=document.getElementById('nexusBootCopyBtn');
                        if(copyBtn) copyBtn.onclick=function(){ window.nexusCopyBootErrorCode(code, copyBtn); };
                    }
                }catch(e){}
            };
            function releaseBootScreen(){
                if(window.__nexusBootError) return;
                try{document.documentElement.classList.remove('nexus-booting','nexus-boot-error');}catch(e){}
                try{
                    var boot=document.getElementById('nexusBootScreen');
                    if(boot) boot.setAttribute('aria-hidden','true');
                }catch(e){}
            }
            window.nexusMarkAppReady=function(){
                window.__nexusAppReady=true;
                requestAnimationFrame(function(){ requestAnimationFrame(releaseBootScreen); });
            };
            setTimeout(function(){
                if(!window.__nexusAppReady && !window.__nexusBootError && typeof window.nexusShowBootError === 'function'){
                    window.nexusShowBootError('N1700', new Error('boot timeout'));
                }
            },8000);
        })();
    </script>

    <script>
        (function(){
            var files = ['data.js','config.js','app.js'];
            function loadNext(index){
                if(index >= files.length) return;
                var src = files[index];
                var script = document.createElement('script');
                script.src = window.nexusAssetUrl(src, src);
                script.async = false;
                script.onload = function(){ loadNext(index + 1); };
                script.onerror = function(){
                    if(typeof window.nexusShowBootError === 'function') window.nexusShowBootError('N1002', new Error(src + ' load failed'));
                };
                document.body.appendChild(script);
            }
            loadNext(0);
        })();
    </script>
