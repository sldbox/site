<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>개복디 넥서스</title>
    <meta name="theme-color" content="#030508">
    <link rel="icon" href="https://sldbox.github.io/site/image/logo/icon.png?v=1" type="image/png">
    <link rel="shortcut icon" href="https://sldbox.github.io/site/image/logo/icon.png?v=1" type="image/png">
    <meta name="description" content="개복디 넥서스 - 히든조합&정수 계산 HUB">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sldbox.github.io/site/">
    <meta property="og:title" content="개복디 넥서스 - 히든조합&정수 계산 HUB">
    <meta property="og:description" content="개복디 넥서스 - 히든조합&정수 계산 HUB">
    <meta property="og:image" content="https://sldbox.github.io/site/image/logo/logo.png?v=1">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="개복디 넥서스 - 히든조합&정수 계산 HUB">
    <meta name="twitter:description" content="개복디 넥서스 - 히든조합&정수 계산 HUB">
    <meta name="twitter:image" content="https://sldbox.github.io/site/image/logo/logo.png?v=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&family=Orbitron:wght@700;900&family=Song+Myung&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="introCinematic" class="intro-cinematic">
    <div class="intro-content">
        <h1 class="intro-title">개복디 넥서스</h1>
        <div class="intro-status" data-text="SYSTEM ONLINE">SYSTEM ONLINE</div>
        <div class="intro-counter" id="introCounter">0%</div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
</div>
<main class="main-layout" id="mainLayout" style="opacity: 0; transform: scale(0.98); transition: opacity 1s ease, transform 1s cubic-bezier(0.2,0.8,0.2,1);">
    <div class="hud-panel panel-codex" id="leftPanel">
        <div class="corner-tl"></div><div class="corner-br"></div>
        <div class="panel-header" style="flex-direction:column; align-items:stretch; padding:0; background:var(--panel-hdr-bg);">
            <div style="padding:8px 16px; border-bottom:1px solid var(--border); display:flex; align-items:stretch; justify-content:space-between; gap:16px; background:var(--g-faint); position:relative; overflow:hidden; min-height: 54px;">
                <div class="header-scanline"></div>
                <div style="display:flex; align-items:center; gap:12px; position:relative; z-index:2;">
                    <span class="nexus-main-title" id="nexusCycleTitle">개복디 넥서스</span>
                </div>
                <div style="display:flex; gap:6px; position:relative; z-index:2; align-items: stretch; flex-wrap: wrap; justify-content: flex-end;">
                    <button class="btn-hdr-sm neon" onclick="startGuideTour(true)" style="color:#a855f7; border-color:rgba(168,85,247,0.3);">💡 가이드</button>
                    <button class="btn-hdr-sm neon" onclick="openNoticeModal()" style="color:#3b82f6; border-color:rgba(59,130,246,0.3);">📢 공지/건의</button>
                    <button class="btn-hdr-sm" id="btnJewelToggle" onclick="toggleJewelPanel()" style="border-color:rgba(255,215,0,0.35); color:#FFD700;">✦ 쥬얼도감</button>
                    <button class="btn-hdr-sm neon" onclick="resetCodex()">⟲ 선택 초기화</button>
                </div>
            </div>
            <div id="classicSearchContainer">
                <div class="search-wrap" id="searchWrap">
                    <input type="text" class="search-input" id="unitSearchInput" placeholder="유닛 검색 또는 다중 커맨드 (예: 저격수*8/아몬/전쟁광*4)" autocomplete="off">
                    <div class="search-results" id="searchResults"></div>
                    <div id="activeRoster" class="active-roster"></div>
                </div>
            </div>
            <div class="codex-tabs-wrap" id="codexTabsWrap" style="display:flex; width:100%; gap:6px; padding:10px; border-bottom:1px solid var(--border); align-items:center;">
                <div class="codex-tabs" id="codexTabs" style="flex:1;"></div>
            </div>
        </div>
        <div class="panel-body" id="leftPanelBody">
            <div id="tabContent"></div>
        </div>
    </div>
    <div class="col-center" id="centerPanel">
        <div class="hud-panel" id="costDashboardPanel" style="flex: 1 1 auto;">
            <div class="corner-tl"></div><div class="corner-br"></div>
            <div class="panel-header" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="ph-icon" style="color:var(--grade-epic); border-color:var(--grade-epic);">❖</span>
                    <span class="ph-title" style="text-shadow:0 0 15px rgba(251,146,60,0.8), 0 0 5px rgba(251,146,60,0.5);">코스트 대시보드</span>
                </div>
                <div style="display: flex; align-items: stretch; gap: 4px;">
                    <button class="btn-toggle-layout active" id="btnToggleMode" onclick="toggleViewMode()" style="width: 130px; justify-content: center; background: rgba(0,0,0,0.5); border: 1px solid var(--border-light);">
                        <span class="toggle-icon">◧</span> 체크리스트 전환
                    </button>
                </div>
            </div>
            <div class="panel-body" style="padding:12px;">
                <div class="magic-grid" id="magicDashboard"></div>
            </div>
        </div>
    </div>
    <div class="hud-panel col-right" id="rightPanel" style="display: flex; flex-direction: column; overflow: hidden; min-height: 0;">
        <div class="corner-tl"></div><div class="corner-br"></div>
        <div class="panel-header" style="justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="ph-icon" style="color:var(--grade-unique); border-color:var(--grade-unique);">⊖</span>
                <span class="ph-title" style="text-shadow:0 0 15px rgba(239,68,68,0.8), 0 0 5px rgba(239,68,68,0.5);">체크리스트 보드</span>
            </div>
            <div style="display: flex; align-items: stretch; gap: 8px;">
                <button class="btn-hdr-sm neon" onclick="resetCodex()">⟲ 목표 초기화</button>
                <button class="btn-hdr-sm neon" onclick="resetCompleted()" style="color:#10b981; border-color:rgba(16,185,129,0.3);">✔ 완료 초기화</button>
            </div>
        </div>
        <div class="panel-body" id="deductionBoard" style="padding:16px; overflow-y:auto; background:transparent;"></div>
    </div>
    <div class="col-jewel" id="jewelPanel" style="display:none;">
        <div class="hud-panel" style="height:100%;">
            <div class="corner-tl"></div><div class="corner-br"></div>
            <div class="panel-header" style="justify-content:space-between; background:rgba(255,215,0,0.05);">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="ph-icon" style="color:#FFD700; border-color:#FFD700;">✦</span>
                    <span class="ph-title" style="text-shadow:0 0 15px rgba(255,215,0,0.7);">쥬얼 도감</span>
                </div>
                <button class="btn-hdr-sm neon" onclick="closeJewelPanel()" style="border-color:rgba(255,215,0,0.35); color:#FFD700;">✖ 대시보드로 복귀 (ESC)</button>
            </div>
            <div class="panel-body" style="padding:20px; overflow-y:auto; background:transparent;">
                <div id="jewelMiniGrid" class="jewel-mini-grid"></div>
            </div>
        </div>
    </div>
</main>

<div id="noticeModal" class="notice-modal-overlay" style="display:none;">
    <div class="notice-modal">
        <div class="notice-header">
            <h2>📢 공지사항 및 건의</h2>
            <button class="notice-close" onclick="closeNoticeModal()">✖</button>
        </div>
        <div class="notice-body" style="user-select: text; -webkit-user-select: text;">
            <p><strong>개복디 넥서스</strong>를 이용해 주셔서 감사합니다!</p>
            <p style="margin-top:10px;">
                사용 중 발생하는 <strong>오류 제보</strong>나 더 나은 서비스를 위한<br>
                <strong>기능 건의/피드백</strong>은 언제든 환영합니다.
            </p>
            <div class="contact-box">
                <div><span class="c-icon">🎮</span> 인게임 귓말: <strong style="color:var(--grade-magic);">회장</strong></div>
                <div><span class="c-icon">💬</span> 디스코드 멘션: <strong style="color:var(--grade-legend);">@회장</strong></div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-sub); margin-top: 15px; text-align: center;">여러분의 소중한 피드백이 더 나은 넥서스를 만듭니다!</p>
        </div>
    </div>
</div>

<div id="guideBlocker" class="guide-blocker" style="display:none;"></div>
<div id="guideHighlight" class="guide-highlight" style="display:none;"></div>
<div id="guideClickCatcher" class="guide-click-catcher" style="display:none;"></div>
<div id="guideTooltip" class="guide-tooltip" style="display:none;">
    <div id="guideText" class="guide-text"></div>
    <div class="guide-ctrl">
        <button class="btn-guide-skip" onclick="endGuideTour()">건너뛰기</button>
        <button class="btn-guide-next" id="btnGuideNext" onclick="nextGuideStep()">다음 ➔</button>
    </div>
</div>

<div id="recipeTooltip" class="recipe-tooltip"></div>
<div id="toastContainer" class="toast-container"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
