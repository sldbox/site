<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>개복디 넥서스</title>

    <link rel="icon" href="https://sldbox.github.io/site/image/logo/icon.png" type="image/png">
    <link rel="shortcut icon" href="https://sldbox.github.io/site/image/logo/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://sldbox.github.io/site/image/logo/icon.png">
    <meta name="description" content="개복디 넥서스 - 데시보드 허브">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sldbox.github.io/site/">
    <meta property="og:title" content="개복디 넥서스 - 데시보드 허브">
    <meta property="og:description" content="개복디 넥서스 - 데시보드 허브">
    <meta property="og:image" content="https://sldbox.github.io/site/image/logo/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&family=Orbitron:wght@700;900&family=Song+Myung&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="main-layout" id="mainLayout">
    <div class="hud-panel panel-codex">
        <div class="panel-header" style="flex-direction:column; align-items:stretch; padding:0; background:var(--panel-hdr-bg);">
            <div style="padding:8px 16px; border-bottom:1px solid var(--border); display:flex; align-items:stretch; justify-content:space-between; gap:16px; background:var(--g-faint); position:relative; overflow:hidden; min-height: 54px;">
                <div class="header-scanline"></div>
                <div style="display:flex; align-items:center; gap:12px; position:relative; z-index:2;">
                    <span class="nexus-main-title">개복디 넥서스</span>
                    <span style="color:var(--g-dim);">|</span>
                    <span style="font-size:0.8rem; color:var(--g); font-weight:800;">제작자 / 회장</span>
                </div>
                <div style="display:flex; gap:8px; position:relative; z-index:2; align-items: stretch;">
                    <button class="btn-hdr-sm" onclick="openJewelModal()">✦ 쥬얼 도감</button>
                    <button class="btn-hdr-sm neon" onclick="resetCodex()">⟲ 선택 초기화</button>
                </div>
            </div>
            <div style="display:flex; width:100%; gap:6px; padding:10px; border-bottom:1px solid var(--border); align-items:center;">
                <div class="codex-tabs" id="codexTabs" style="flex:1;"></div>
            </div>
        </div>
        <div class="panel-body">
            <div id="tabContent"></div>
        </div>
    </div>

    <div class="col-center">
        <div class="hud-panel" style="flex: 1 1 auto;">
            <div class="panel-header" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="ph-icon" style="color:var(--grade-epic); border-color:var(--grade-epic);">❖</span>
                    <span class="ph-title" style="text-shadow:0 0 15px rgba(251,146,60,0.8), 0 0 5px rgba(251,146,60,0.5);">코스트 데시보드</span>
                </div>
                <div style="display: flex; align-items: stretch;">
                    <button class="btn-toggle-deduct" onclick="toggleDeduction()">
                        <span class="toggle-icon">◫</span> 차감 데시보드 열기/닫기
                    </button>
                </div>
            </div>
            <div class="panel-body" style="padding:12px;">
                <div class="magic-grid" id="magicDashboard"></div>
            </div>
        </div>
    </div>

    <div class="hud-panel col-right" id="rightPanel" style="display: flex; flex-direction: column; overflow: hidden; min-height: 0;">
        <div class="panel-header" style="justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="ph-icon" style="color:var(--grade-unique); border-color:var(--grade-unique);">⊖</span>
                <span class="ph-title" style="text-shadow:0 0 15px rgba(239,68,68,0.8), 0 0 5px rgba(239,68,68,0.5);">차감 데시보드</span>
            </div>
            <div style="display: flex; align-items: stretch;">
                <button class="btn-hdr-sm neon" onclick="resetOwned()">⟲ 보유 초기화</button>
            </div>
        </div>
        <div class="panel-body" id="deductionBoard" style="padding:16px; overflow-y:auto; background:var(--panel);"></div>
    </div>
</main>

<div class="modal-backdrop" id="jewelModal" onclick="closeJewelModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()" style="width:min(1100px, 95vw); max-height:85vh;">
        <div class="modal-head">
            <h2 style="font-family:'Orbitron', sans-serif;">쥬얼 도감</h2>
            <button class="btn-close" onclick="closeJewelModal()">&times;</button>
        </div>
        <div class="modal-body-scroll" style="background:var(--panel-b);">
            <div id="jewelGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
