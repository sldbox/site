/* === NEW CINEMATIC INTRO STYLES === */
#intro-screen{position:fixed;inset:0;z-index:10000;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;perspective:1000px;}
#intro-screen::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15),rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:10001;}
.intro-bg-text{position:absolute;top:0;left:0;width:100%;height:100%;font-family:monospace;font-size:0.8rem;color:rgba(255,191,0,0.08);line-height:1.2;white-space:pre-wrap;word-break:break-all;overflow:hidden;z-index:1;text-align:justify;}
.intro-center-box{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;animation:box-appear 1.5s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;transform:translateZ(-100px);}
@keyframes box-appear{100%{opacity:1;transform:translateZ(0);}}
.intro-logo-svg{width:140px;height:140px;margin-bottom:24px;filter:drop-shadow(0 0 10px rgba(255,191,0,0.5));}
.intro-logo-svg path,.intro-logo-svg polygon,.intro-logo-svg circle,.intro-logo-svg line{stroke-dasharray:250;stroke-dashoffset:250;animation:dash-draw 2s cubic-bezier(0.4,0,0.2,1) forwards;}
@keyframes dash-draw{to{stroke-dashoffset:0;}}
.intro-glitch-title{font-family:var(--font-mono);font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#FFF;letter-spacing:0.15em;position:relative;margin-bottom:8px;text-transform:uppercase;animation:glitch-anim 3s infinite;}
@keyframes glitch-anim{0%,100%{text-shadow:none;}20%{text-shadow:2px 0 #FFBF00,-2px 0 #00f;}21%{text-shadow:none;}}
.intro-pct{font-family:var(--font-mono);color:var(--text-sub);font-size:0.85rem;letter-spacing:0.2em;margin-bottom:16px;}
.intro-bar-wrap{width:min(400px,80vw);height:2px;background:#222;position:relative;overflow:hidden;}
.intro-bar-fill{height:100%;background:var(--g);width:0%;box-shadow:0 0 12px var(--g);transition:width 0.05s linear;}
.intro-flash{position:absolute;inset:0;background:#FFF;opacity:0;z-index:10002;pointer-events:none;transition:opacity 0.2s ease;}
.intro-screen-hide{animation:intro-hide 0.6s cubic-bezier(0.87,0,0.13,1) forwards;}
@keyframes intro-hide{0%{transform:scale(1);opacity:1;}40%{transform:scale(1.1);filter:brightness(2) contrast(1.5);}100%{transform:scale(2);opacity:0;}}
.skip-hint{position:absolute;bottom:32px;z-index:6;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);letter-spacing:0.2em;animation:blink-fast 1.5s step-end infinite;}
@keyframes blink-fast{50%{opacity:0;}}

/* 계보 & 조합 트리 패널의 내부 휠 스크롤 활성화 (강제 적용) */
.panel-tree .panel-body {
    overflow-y: auto !important;
    overflow-x: hidden;
}

/* --- PC 브라우저 창 조절을 완벽하게 지원하는 반응형 미디어 쿼리 패치 --- */

/* 1. PC 및 대형 화면 (900px 이상, 기본 3단 배열) */
@media (min-width: 900px) {
    body { min-width: 900px; overflow-x: auto; }
    .main-layout { min-width: 884px; }
}

/* 2. 태블릿 세로 및 창을 줄인 PC (600px ~ 899px, 세로 비율) -> 2단 배열 */
@media (max-width: 899px) and (min-width: 600px) and (orientation: portrait) {
    .main-layout { grid-template-columns: 1fr 1fr !important; grid-template-rows: 60px 1fr 40vh !important; height: 100vh; overflow-y: auto; }
    .panel-title { grid-column: 1 / 3 !important; grid-row: 1 !important; position: sticky !important; top: 0 !important; z-index: 100; height: 60px !important; }
    .panel-codex { grid-column: 1 !important; grid-row: 2 !important; }
    .panel-unified { grid-column: 2 !important; grid-row: 2 !important; }
    .panel-tree { grid-column: 1 / 3 !important; grid-row: 3 !important; }
    .unified-body { grid-template-rows: repeat(5, 1fr); }
}

/* 3. 일반 모바일 세로 (480px ~ 599px) -> 1단 스크롤 배열 */
@media (max-width: 599px) and (min-width: 480px) and (orientation: portrait) {
    body { min-width: unset !important; overflow-x: hidden !important; }
    .main-layout { display: flex !important; flex-direction: column !important; height: auto !important; min-height: 100svh; overflow-y: auto !important; overflow-x: hidden !important; padding: calc(var(--safe-top) + 8px) 8px calc(var(--safe-bot) + 18px) 8px !important; gap: 8px !important; }
    .panel-title { order: 1; flex: none; height: 60px !important; width: 100% !important; position: sticky !important; top: 0 !important; z-index: 100; }
    .panel-unified { order: 2; flex: none; width: 100% !important; height: auto !important; }
    .panel-codex { order: 3; flex: none; width: 100% !important; height: auto !important; }
    .panel-tree { order: 4; flex: none; width: 100% !important; height: auto !important; grid-column: unset !important; grid-row: unset !important; }
    .unified-body { height: auto; grid-template-rows: repeat(5, 60px); }
    .u-cell { min-height: 52px; }
    .u-val { font-size: clamp(1rem, 3vw, 1.4rem); }
    .u-label { font-size: clamp(0.58rem, 1.6vw, 0.72rem); }
    .codex-qty { width: 110px; }
    .codex-qty .qty-btn { width: auto; font-size: 1.4rem; min-height: 50px; }
    .qty-btn { font-size: 1.4rem; min-height: 50px; }
}

/* 4. 소형 모바일 세로 (479px 이하) -> 1단 배열 및 여백 압축 */
@media (max-width: 479px) and (orientation: portrait) {
    body { min-width: unset !important; overflow-x: hidden !important; }
    .main-layout { display: flex !important; flex-direction: column !important; height: auto !important; min-height: 100svh; overflow-y: auto !important; overflow-x: hidden !important; padding: calc(var(--safe-top) + 6px) 6px calc(var(--safe-bot) + 14px) 6px !important; gap: 6px !important; }
    .panel-title { order: 1; flex: none; height: 54px !important; width: 100% !important; position: sticky !important; top: 0 !important; z-index: 100; }
    .panel-unified { order: 2; flex: none; width: 100% !important; }
    .panel-codex { order: 3; flex: none; width: 100% !important; grid-column: unset !important; grid-row: unset !important; }
    .panel-tree { order: 4; flex: none; width: 100% !important; grid-column: unset !important; grid-row: unset !important; }
    .unified-body { height: auto; grid-template-rows: repeat(5, 52px); }
    .u-cell { min-height: 44px; }
    .u-val { font-size: clamp(0.9rem, 4vw, 1.2rem); }
    .u-label { font-size: clamp(0.5rem, 2vw, 0.65rem); }
    .codex-qty .qty-btn { font-size: 1.3rem; min-height: 46px; }
    .qty-btn { font-size: 1.3rem; }
    .header-author-standalone { font-size: clamp(0.6rem, 3vw, 0.85rem); }

    .panel-title .btn-header { font-size: clamp(0.65rem, 3vw, 0.85rem); padding: 0 10px; }
    .panel-title .site-icon { width: 28px; height: 28px; }
}

/* 5. 모바일 가로 모드 (899px 이하) -> 좁은 비율 보호용 3단 배열 */
@media (max-width: 899px) and (orientation: landscape) {
    body { min-width: unset !important; overflow-x: hidden !important; }
    .main-layout { display: grid !important; grid-template-columns: 40fr 40fr 20fr !important; grid-template-rows: 50px 1fr !important; height: 100svh !important; overflow: hidden !important; padding: calc(var(--safe-top) + 6px) 6px calc(var(--safe-bot) + 6px) 6px !important; gap: 6px !important; }
    .panel-title { grid-column: 1 / 3 !important; grid-row: 1 !important; order: unset !important; height: auto !important; width: auto !important; }
    .panel-codex { grid-column: 1 !important; grid-row: 2 !important; order: unset !important; height: 100% !important; width: auto !important; }
    .panel-unified { grid-column: 2 !important; grid-row: 2 !important; order: unset !important; height: 100% !important; width: auto !important; }
    .panel-tree { grid-column: 3 !important; grid-row: 1 / 3 !important; order: unset !important; height: 100% !important; width: auto !important; }
    .unified-body { grid-template-rows: repeat(5, 1fr) !important; height: 100%; }
    .u-cell { min-height: 0 !important; }
    .u-val { font-size: clamp(0.8rem, 2vw, 1.2rem) !important; }

    .panel-tree .panel-body { max-height: unset !important; overflow-y: auto; }

function saveData() {
    try {
        localStorage.setItem('nexus_obd_units', JSON.stringify(Array.from(activeUnits.entries())));
        localStorage.setItem('nexus_obd_essence', JSON.stringify(Array.from(essenceUnits)));
    } catch (e) {
        console.error("Data save failed", e);
    }
}

function loadData() {
    try {
        const savedUnits = localStorage.getItem('nexus_obd_units');
        const savedEssence = localStorage.getItem('nexus_obd_essence');
        if (savedUnits) {
            const parsed = JSON.parse(savedUnits);
            parsed.forEach(([k, v]) => activeUnits.set(k, v));
        }
        if (savedEssence) {
            const parsed = JSON.parse(savedEssence);
            parsed.forEach(k => essenceUnits.add(k));
        }
    } catch (e) {
        console.error("Data load failed", e);
    }
}

    const u = unitMap.get(clean(String(name).split(/[(\[▶▼]/)[0]));
    return u && gradeColorsRaw[u.grade] ? gradeColorsRaw[u.grade] : "var(--text)";
}

function gradeTag(grade){
    return `<span class="gtag" style="color:${gradeColorsRaw[grade]||'#fff'};border-color:${gradeColorsRaw[grade]||'#fff'}44;">${GRADE_SHORT[grade]||grade}</span>`;
}

function processCostKeyword(rawName,amount,map){
    let matched=false;
    const cName=clean(rawName);
    for(const conf of specialKeywordMap){
        if(conf.keys.some(k=>cName.includes(clean(k)))){
            const val=conf.divider?amount/conf.divider:amount;
            if(conf.subKey){
                if(!map[conf.atom])map[conf.atom]={갓오타:0,메시브:0};
                map[conf.atom][conf.subKey]+=val;
            } else map[conf.atom]=(map[conf.atom]||0)+val;
            matched=true; break;
        }
    }
    if(!matched){
        const atom=dashboardAtoms.find(a=>clean(a.name)===cName);
        if(atom){map[atom.name]=(map[atom.name]||0)+amount;matched=true;}
    }
    return matched;
}

function parseFixedCost(costStr,multiplier,map){
    if(!costStr||["정보 부족","미발견","없음",""].includes(costStr))return;
    costStr.split(',').forEach(p=>{
        const m=p.match(/(.+?)\[(\d+(?:\.\d+)?)\]/);
        if(m) processCostKeyword(m[1].trim(),parseFloat(m[2])*multiplier,map);
        else processCostKeyword(p.trim(),multiplier,map);
    });
}

function calculateRecursiveCost(name,m,map,visited=new Set()){
    const pName=clean(name.split(/[(\[]/)[0]);
    if(visited.has(pName))return;
    const curV=new Set(visited); curV.add(pName);
    if(processCostKeyword(pName,m,map))return;
    const u=unitMap.get(pName);
    if(u&&u.recipe&&!IGNORE_PARSE_RECIPES.includes(u.recipe)){
        u.recipe.split('+').forEach(part=>{
            const match=part.trim().match(/^([^(\[]+)/);
            if(match){
                const ingName=match[1].trim();
                const cntMatch=part.match(/\[(\d+)\]/);
                const cnt=cntMatch?parseInt(cntMatch[1]):1;
                const childU=unitMap.get(clean(ingName));
                if(childU&&childU.cost&&!["정보 부족","미발견","없음",""].includes(childU.cost))
                    parseFixedCost(childU.cost,cnt*m,map);
                else calculateRecursiveCost(ingName,cnt*m,map,curV);
            } else calculateRecursiveCost(part.trim(),m,map,curV);
        });
    }
}

function calculateTotalCostScore(costStr){
    if(!costStr||["정보 부족","미발견","없음"].includes(costStr))return 0;
    let total=0;
    const re=/\[(\d+(?:\.\d+)?)\]/g; let m;
    while((m=re.exec(costStr))!==null) total+=parseFloat(m[1]);
    return total;
}

function toggleUnitSelection(name){
    const cName=clean(name);
    if(activeUnits.has(cName)){
        activeUnits.delete(cName);
        essenceUnits.delete(cName);
    } else {
        activeUnits.set(cName,1);
        essenceUnits.add(cName);
    }
    saveData();
    updateAllPanels();
    const activeTabIdx=Array.from(document.querySelectorAll('.tab-btn')).findIndex(b=>b.classList.contains('active'));
    if(activeTabIdx>=0) selectTab(activeTabIdx);
    renderSelectedArea();
    updateTabDots();
}

function changeQty(name, delta){
    const cName=clean(name);
    if(!activeUnits.has(cName)) return;
    const cur=activeUnits.get(cName)||1;
    const next=Math.max(1,Math.min(8,cur+delta));
    activeUnits.set(cName,next);
    saveData();
    const selQty=document.getElementById(`sel-qty-${cName}`);
    if(selQty) selQty.textContent=next;
    updateAllPanels();
}

}

}

function updateEssence(){
    let counts={coral:0,aiur:0,zerus:0,hybrid:0};
    essenceUnits.forEach(key=>{
        const u=unitMap.get(key);
        if(u&&["히든","슈퍼히든"].includes(u.grade)){
            if(["테바","테메"].includes(u.category))      counts.coral+=1;
            else if(["토바","토메"].includes(u.category)) counts.aiur+=1;
            else if(u.category==="저그중립")              counts.zerus+=1;
            else if(u.category==="혼종")                  counts.hybrid+=1;
        }
    });
    const coralTotal=counts.coral+counts.hybrid;
    const aiurTotal =counts.aiur +counts.hybrid;
    const zerusTotal=counts.zerus+counts.hybrid;
    const allTotal  =coralTotal+aiurTotal+zerusTotal;

    const cap=v=>Math.min(v,9999);
    const setU=(id,v)=>{
        const el=document.getElementById(id);
        const capped=cap(v);
        if(el){el.innerText=capped;el.className='u-val'+(capped>0?' nonzero':'');}
    };
    setU('u-total-essence',allTotal);
    setU('u-coral',coralTotal);
    setU('u-aiur', aiurTotal);
    setU('u-zerus',zerusTotal);
}

function renderTreeAndMagic(){
    resetUnifiedCostSlots();

    if(activeUnits.size===0){
        DOM.treeView.innerHTML=`<div class="empty-hud">
            <div class="empty-hud-tree-title">계보 &amp; 조합 트리</div>
            <div class="empty-hud-icon">◈</div>
            <div class="empty-hud-msg">명령 대기 중</div>
            <div class="empty-hud-sub" id="emptyHudSub">좌측 도감에서 유닛을 선택하십시오</div>
        </div>`;
        updateEmptyHudText();
        return;
    }

    const totalMap={};
    dashboardAtoms.forEach(a=>{
        if(a.name==="갓오타/메시브") totalMap[a.name]={갓오타:0,메시브:0};
        else totalMap[a.name]=0;
    });

    let totalMagicCost=0;
    let html='';
    const keys=Array.from(activeUnits.keys());

    if(keys.length===1){
        const targetU=unitMap.get(keys[0]);
        if(targetU&&["레전드","히든","헬","슈퍼히든"].includes(targetU.grade)){
            const parents=unitDatabase.filter(u=>
                ["히든","슈퍼히든"].includes(u.grade)&&
                u.name!==targetU.name&&
                u.recipe&&u.recipe.includes(targetU.name)
            );
            if(parents.length>0){
                parents.sort((a,b)=>GRADE_ORDER.indexOf(a.grade)-GRADE_ORDER.indexOf(b.grade));
                html+=`<div class="analysis-card" style="border-left-color:var(--grade-rare);">
                    <h3 style="color:var(--grade-rare);border-bottom-color:#222;">> 상위 조합 가능</h3>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">`;
                parents.forEach(p=>{
                    html+=`<div class="compat-badge" style="color:${getUnitColor(p.name)};" onclick="toggleUnitSelection('${p.name}')">${p.name}</div>`;
                });
                html+=`</div></div>`;
            }
        }
    }

    keys.forEach(k=>{
        const u=unitMap.get(k); if(!u) return;
        const c=activeUnits.get(k)||1;
        if(u.cost&&!["정보 부족","미발견","없음",""].includes(u.cost))
            parseFixedCost(u.cost,c,totalMap);
        else
            calculateRecursiveCost(u.name,c,totalMap);
        totalMagicCost+=calculateTotalCostScore(u.cost)*c;

        html+=`<div class="analysis-card" id="card-${k}" data-card-state="open">
            <h3>
                <span class="card-title-btn" style="color:${getUnitColor(u.name)};cursor:pointer;" onclick="toggleCardTitle(this)">${u.name}${c>1?` <span style="color:var(--text-sub);font-size:0.85rem;">x${c}</span>`:''}<span class="card-title-arrow" style="font-size:0.7rem;margin-left:6px;color:#555;">▼</span></span>
                <button class="btn-small" data-expanded="false" onclick="toggleAllTree(this)">모두 펼치기</button>
            </h3>
            ${buildRootContent(k, c)}
        </div>`;
    });

    DOM.treeView.innerHTML=html;

    const totalMagicEl=document.getElementById('u-total-magic');
    if(totalMagicEl){
        totalMagicEl.innerText=Math.min(Math.ceil(totalMagicCost),9999);
        totalMagicEl.className='u-val'+(totalMagicCost>0?' nonzero':'');
    }

    dashboardAtoms.forEach(a=>{
        const val=totalMap[a.name];
        const container=document.getElementById(`ucslot-${a.name}`);
        if(!container) return;
        const e=container.querySelector('.u-val');
        const nameEl=container.querySelector('.u-label');
        if(a.name==="갓오타/메시브"){
            if(val.갓오타>0||val.메시브>0){
                let h="";
                if(val.갓오타>0) h+=`<div style="font-size:0.75rem;color:var(--grade-rare);">갓오타 ${Math.ceil(val.갓오타)}</div>`;
                if(val.메시브>0) h+=`<div style="font-size:0.75rem;color:var(--grade-unique);">메시브 ${Math.ceil(val.메시브)}</div>`;
                e.innerHTML=h;
                if(nameEl) nameEl.style.display='none';
                container.classList.add('active');
            }
        } else if(val>0){
            e.innerText=Math.ceil(val);
            if(nameEl) nameEl.style.display='block';
            container.classList.add('active');
        }
    });
}

function formatCostHTML(cost){
    if(!cost||["정보 부족","미발견","없음",""].includes(cost)) return '';
    return cost.split(',').map(p=>{
        p=p.trim();
        const m=p.match(/^(.+?)\[(\d+(?:\.\d+)?)\]$/);
        if(m) return `<span class="cost-unit-name">${m[1].trim()}</span><span class="cost-unit-cnt">[${m[2]}]</span>`;
        return `<span class="cost-unit-name">${p}</span>`;
    }).join('<span style="color:#555;margin:0 2px;">,</span>');
}

function buildRootContent(key, qty){
    const u=unitMap.get(key);
    if(!u) return '';
    const visited=new Set([key]);

    let ch='';
    if(u.recipe&&!IGNORE_PARSE_RECIPES.includes(u.recipe)){
        u.recipe.split('+').forEach(part=>{
            const match=part.trim().match(/^([^(\[]+)(?:\(([^)]+)\))?(?:\[(\d+)\])?/);
            if(match){
                const childName=clean(match[1]);
                const rawName=match[1].trim();
                const cond=match[2]?`(${match[2]})`:'';
                const cnt=match[3]?`[${match[3]}]`:'';
                const combined=`${cond}${cnt}`;
                const target=unitMap.get(childName);
                if(target&&target.key!==u.key){
                    ch+=buildTree(target.key||childName,visited,false,combined,1);
                } else {
                    const cp=parseCondAndCnt(combined);
                    ch+=`<li class="tree-li"><div class="tree-node-wrapper">
                        <div class="node-btn">
                            <span class="node-name" style="color:var(--text-muted);">${rawName}</span>
                            ${cp.cond?`<span class="node-cond">${cp.cond}</span>`:''}
                            ${cp.cnt?`<span class="node-cnt">${cp.cnt}</span>`:''}
                        </div>
                    </div></li>`;
                }
            } else {
                const childName=clean(part);
                const target=unitMap.get(childName);
                if(target&&target.key!==u.key) ch+=buildTree(target.key||childName,visited,false,'',1);
            }
        });
    }

    const isRedundant=u.recipe&&u.cost&&clean(u.recipe).replace(/\+/g,',')===clean(u.cost).replace(/\+/g,',');
    const costHTML=formatCostHTML(u.cost);
    const hasCost=costHTML&&!isRedundant&&!["미발견","없음",""].includes(u.cost);

    return `${ch?`<ul class="tree-ul root-ul" style="display:block;">${ch}</ul>`:''}
            ${hasCost?`<div class="bullet-cost" style="display:block;"><span class="lbl-cost">비용:</span>${costHTML}</div>`:''}`;
}

function buildTree(key,visited=new Set(),isRoot=false,conditionStr='',depth=0){
    const u=unitMap.get(key);

    if(!u){
        const condPart=parseCondAndCnt(conditionStr);
        return `<li class="tree-li"><div class="tree-node-wrapper">
            <div class="node-btn">
                <span class="node-name" style="color:var(--text-muted);">${key}</span>
                ${condPart.cond?`<span class="node-cond">${condPart.cond}</span>`:''}
                ${condPart.cnt?`<span class="node-cnt">${condPart.cnt}</span>`:''}
            </div>
        </div></li>`;
    }

    if(visited.has(key)){
        return `<li class="tree-li"><div class="tree-node-wrapper">
            <div class="node-btn duplicate">
                <span class="node-name" style="color:var(--text-muted);">${u.name} (중복)</span>
            </div>
        </div></li>`;
    }

    const newV=new Set(visited); newV.add(key);

    let ch='';
    if(u.recipe&&!IGNORE_PARSE_RECIPES.includes(u.recipe)){
        u.recipe.split('+').forEach(part=>{
            const match=part.trim().match(/^([^(\[]+)(?:\(([^)]+)\))?(?:\[(\d+)\])?/);
            if(match){
                const childName=clean(match[1]);
                const rawName=match[1].trim();
                const cond=match[2]?`(${match[2]})`:'';
                const cnt=match[3]?`[${match[3]}]`:'';
                const combined=`${cond}${cnt}`;
                const target=unitMap.get(childName);
                if(target&&target.key!==u.key){
                    ch+=buildTree(target.key||childName,newV,false,combined,depth+1);
                } else {
                    const cp=parseCondAndCnt(combined);
                    ch+=`<li class="tree-li"><div class="tree-node-wrapper">
                        <div class="node-btn">
                            <span class="node-name" style="color:var(--text-muted);">${rawName}</span>
                            ${cp.cond?`<span class="node-cond">${cp.cond}</span>`:''}
                            ${cp.cnt?`<span class="node-cnt">${cp.cnt}</span>`:''}
                        </div>
                    </div></li>`;
                }
            } else {
                const childName=clean(part);
                const target=unitMap.get(childName);
                if(target&&target.key!==u.key) ch+=buildTree(target.key||childName,newV,false,'',depth+1);
            }
        });
    }

    const cp=parseCondAndCnt(conditionStr);
    const isRedundant=u.recipe&&u.cost&&clean(u.recipe).replace(/\+/g,',')===clean(u.cost).replace(/\+/g,',');
    const costHTML=formatCostHTML(u.cost);
    const hasCost=costHTML&&!isRedundant&&!["미발견","없음",""].includes(u.cost);
    const hasChildren=ch.length>0;

    return `<li class="tree-li">
        <div class="tree-node-wrapper">
            <div class="node-btn${hasChildren?' has-children':''}" style="color:${getUnitColor(u.name)};" onclick="toggleTreeNode(this)">
                <span class="node-name">${u.name}</span>
                ${cp.cond?`<span class="node-cond">${cp.cond}</span>`:''}
                ${cp.cnt?`<span class="node-cnt">${cp.cnt}</span>`:''}
                ${hasChildren?`<span class="node-toggle">▶</span>`:''}
            </div>
        </div>
        ${hasChildren?`<ul class="tree-ul" style="display:none;">${ch}</ul>`:''}
        ${hasCost?`<div class="bullet-cost" style="display:none;"><span class="lbl-cost">비용:</span>${costHTML}</div>`:''}
    </li>`;
}

function buildRecipeRow(recipe){
    if(!recipe||["미발견","없음",""].includes(recipe)) return '';
    return recipe.split('+').map((part)=>{
        part=part.trim();
        const m=part.match(/^([^(\[]+)(?:\(([^)]+)\))?(?:\[(\d+)\])?/);
        if(!m) return `<span class="codex-recipe-item"><span class="node-ing">${part}</span></span>`;
        const nm=(m[1]||'').trim();
        const cond=m[2]?m[2]:'';
        const cnt=m[3]?`×${m[3]}`:'';
        return `<span class="codex-recipe-item">`
            + (nm?`<span class="node-ing">${nm}</span>`:'')
            + (cond?`<span class="node-cond">${cond}</span>`:'')
            + (cnt?`<span class="node-cnt" style="font-size:0.82rem;padding:1px 5px;">${cnt}</span>`:'')
            + `</span>`;
    }).join('');
}

function parseCondAndCnt(str){
    if(!str) return {cond:'',cnt:''};
    const condMatch=str.match(/\(([^)]+)\)/);
    const cntMatch=str.match(/\[(\d+)\]/);
    return {
        cond: condMatch?condMatch[1]:'',
        cnt:  cntMatch?`×${cntMatch[1]}`:''
    };
}

function toggleCardTitle(titleSpan){

    const arrow=titleSpan.querySelector('.card-title-arrow');

    if(state==='open'||state==='full'){
        card.querySelectorAll('.tree-ul').forEach(el=>el.style.display='none');
        card.querySelectorAll('.bullet-cost').forEach(el=>el.style.display='none');
        card.querySelectorAll('.node-toggle').forEach(el=>el.textContent='▶');
        card.setAttribute('data-card-state','closed');

        const expandBtn=card.querySelector('.btn-small');
        if(expandBtn){ expandBtn.innerText='모두 펼치기'; expandBtn.setAttribute('data-expanded','false'); }
    } else {
        const rootUl=card.querySelector('.tree-ul.root-ul');
        if(rootUl){
            rootUl.style.display='block';
            rootUl.querySelectorAll('.tree-ul').forEach(el=>el.style.display='none');
            rootUl.querySelectorAll('.bullet-cost').forEach(el=>el.style.display='none');
            rootUl.querySelectorAll('.node-toggle').forEach(el=>el.textContent='▶');

    }

function selectAllInTab(idx){
    const catKey=TAB_CATEGORIES[idx].key;
    const items=unitDatabase.filter(u=>
        u.category===catKey && ["슈퍼히든","히든","레전드"].includes(u.grade)
    );
    const allSelected=items.every(item=>activeUnits.has(clean(item.name)));
    if(allSelected){
        items.forEach(item=>{
            const cName=clean(item.name);
            activeUnits.delete(cName);
            essenceUnits.delete(cName);
        });
    } else {
        items.forEach(item=>{
            const cName=clean(item.name);
            if(!activeUnits.has(cName)){
                activeUnits.set(cName,1);
                essenceUnits.add(cName); 
            }
        });
    }
    saveData();
    updateAllPanels();
    selectTab(idx);
    renderSelectedArea();
    updateTabDots();
}

function renderTabs(initialIdx = 0){
    let h='';
    TAB_CATEGORIES.forEach((cat,idx)=>{
        const total=unitDatabase.filter(u=>u.category===cat.key&&["슈퍼히든","히든","레전드"].includes(u.grade)).length;
        h+=`<button class="tab-btn" onclick="selectTab(${idx})">
            <span>${cat.label}</span>
            <span class="tab-count">${total}개</span>
        </button>`;
    });
    document.getElementById('codexTabs').innerHTML=h;
    selectTab(initialIdx);
}

function selectTab(idx){
    try {
        localStorage.setItem('nexus_obd_tab', idx);
    } catch(e){}
    document.querySelectorAll('.tab-btn').forEach((btn,i)=>btn.classList.toggle('active',i===idx));
    const catKey=TAB_CATEGORIES[idx].key;
    let items=unitDatabase.filter(u=>
        u.category===catKey &&
        ["슈퍼히든","히든","레전드"].includes(u.grade) &&
        !activeUnits.has(clean(u.name)) 
    );
    items.sort((a,b)=>{
        if(a.grade==="슈퍼히든"&&b.grade!=="슈퍼히든") return -1;
        if(b.grade==="슈퍼히든"&&a.grade!=="슈퍼히든") return 1;
        return calculateTotalCostScore(b.cost)-calculateTotalCostScore(a.cost);
    });
    const allSelected=items.every(item=>activeUnits.has(clean(item.name)));
    let h=`<div>
        <button class="btn-select-all${allSelected?' is-all-selected':''}"
            onclick="selectAllInTab(${idx})">
            ${allSelected?'✓ 전체 해제':'전체 선택'}
        </button>`;
    items.forEach(item=>{
        const cName=clean(item.name);
        const isEssence=essenceUnits.has(cName);
        const essenceBadge=isEssence?`<span class="essence-label">정수확보</span>`:'';
        const recipeText=item.recipe&&!["","미발견","없음"].includes(item.recipe)?item.recipe:'';
        h+=`<div class="codex-item" data-name="${item.name}">
            <div class="codex-node-row">
                <div class="node-btn codex-node" style="color:${getUnitColor(item.name)};" onclick="toggleUnitSelection('${item.name}')">
                    <span class="node-name">${gradeTag(item.grade)}<span>${item.name}</span>${essenceBadge}</span>
                    ${recipeText?`<span class="codex-recipe-row">${buildRecipeRow(recipeText)}</span>`:''}
                </div>
                <div class="codex-qty" onclick="event.stopPropagation()">
                    <button class="qty-btn" onclick="changeQty('${item.name}',-1)">−</button>
                    <span class="qty-num" id="qty-${cName}">1</span>
                    <button class="qty-btn" onclick="changeQty('${item.name}',1)">+</button>
                </div>
            </div>
        </div>`;
    });
    h+='</div></div>';
    document.getElementById('tabContent').innerHTML=h;
    updateTabDots();
}

function renderUnifiedPanel(){
    const body=document.getElementById('unifiedBody');
    if(!body) return;
    body.innerHTML='';

    body.insertAdjacentHTML('beforeend',`
        <div class="u-cell summary total-magic">
            <div class="u-val" id="u-total-magic">0</div>
            <div class="u-label">총 매직코스트</div>
        </div>`);
    body.insertAdjacentHTML('beforeend',`
        <div class="u-cell summary">
            <div class="u-val" id="u-total-essence">0</div>
            <div class="u-label">총 정수합산</div>
        </div>`);
    body.insertAdjacentHTML('beforeend',`
        <div class="u-cell summary" data-kind="coral">
            <div class="u-val" id="u-coral" style="color:#A33;">0</div>
            <div class="u-label">코랄 정수</div>
        </div>`);
    body.insertAdjacentHTML('beforeend',`
        <div class="u-cell summary" data-kind="aiur">
            <div class="u-val" id="u-aiur" style="color:#A82;">0</div>
            <div class="u-label">아이어 정수</div>
        </div>`);
    body.insertAdjacentHTML('beforeend',`
        <div class="u-cell summary" data-kind="zerus">
            <div class="u-val" id="u-zerus" style="color:#64A;">0</div>
            <div class="u-label">제루스 정수</div>
        </div>`);

    dashboardAtoms.forEach(a=>{
        const d=document.createElement('div');
        d.className='u-cell cost-slot';
        d.id=`ucslot-${a.name}`;
        d.innerHTML=`<div class="u-val">0</div><div class="u-label">${a.name}</div>`;
        body.appendChild(d);
    });
}

function resetUnifiedCostSlots(){
    const totalMagicEl=document.getElementById('u-total-magic');
    if(totalMagicEl){ totalMagicEl.innerText='0'; totalMagicEl.className='u-val'; }

    dashboardAtoms.forEach(a=>{
        const container=document.getElementById(`ucslot-${a.name}`);
        if(!container) return;
        const e=container.querySelector('.u-val');
        const nameEl=container.querySelector('.u-label');
        if(e){ e.innerHTML='0'; e.style.display=''; }
        if(nameEl) nameEl.style.display='block';
        container.classList.remove('active');
    });
}

function resetAll(){
    activeUnits.clear();
    essenceUnits.clear();
    saveData();
    DOM.treeView.innerHTML=`<div class="empty-hud">
        <div class="empty-hud-tree-title">계보 &amp; 조합 트리</div>
        <div class="empty-hud-icon">◈</div>
        <div class="empty-hud-msg">명령 대기 중</div>
        <div class="empty-hud-sub" id="emptyHudSub">좌측 도감에서 유닛을 선택하십시오</div>
    </div>`;
    updateEmptyHudText();
    resetUnifiedCostSlots();
    updateAllPanels();
    renderSelectedArea();
    const activeTabIdx=Array.from(document.querySelectorAll('.tab-btn')).findIndex(b=>b.classList.contains('active'));
    if(activeTabIdx>=0) selectTab(activeTabIdx);
    updateTabDots();
}

function runIntro(){
    const introScreen=document.getElementById('intro-screen');
    const fill=document.getElementById('introBarFill');
    const pct=document.getElementById('introPct');
    const bgText=document.getElementById('introBgText');
    const flash=document.getElementById('introFlash');

    let matrixInterval = setInterval(() => {
        if(bgText) {
            const chars = "0123456789ABCDEF!@#$%^&*()_+-=";
            let str = "";
            for(let i=0; i<150; i++) str += chars[Math.floor(Math.random() * chars.length)];
            bgText.innerText = str + "\n" + bgText.innerText.substring(0, 2000);
        }
    }, 50);

    const introDuration = 2500;
    let start = Date.now();
    const progInterval = setInterval(() => {
        const elapsed = Date.now() - start;
        let p = Math.min(100, Math.floor((elapsed/introDuration)*100));
        
        if(p > 20 && p < 35) p = 20;
        if(p > 65 && p < 80) p = 65;
        
        if(fill) fill.style.width = p + '%';
        if(pct) pct.innerText = `SYSTEM BOOT... ${p}%`;
        
        if(p >= 100) clearInterval(progInterval);
    }, 30);

    let dismissed = false;
    const dismiss = () => {
        if(dismissed) return;
        dismissed = true;
        clearInterval(progInterval);
        clearInterval(matrixInterval);
        
        if(flash) flash.style.opacity = '1';
        
        setTimeout(() => {
            introScreen.classList.add('intro-screen-hide');
            document.getElementById('mainLayout').classList.add('visible');
            setTimeout(() => {
                introScreen.remove();
            }, 600);
        }, 150);
    };

    introScreen.addEventListener('click', dismiss);
    introScreen.addEventListener('touchend', dismiss, {passive: true});
    setTimeout(dismiss, introDuration + 500);
}

window.addEventListener('load',()=>{
    unitDatabase.forEach(u=>{ if(!u.key) u.key=clean(u.name); unitMap.set(u.key,u); });

    DOM.treeView       = document.getElementById('treeView');
    DOM.unifiedBody    = document.getElementById('unifiedBody');        
    
    loadData();

    let initialTab = 0;
    try {
        const savedTab = localStorage.getItem('nexus_obd_tab');
        if(savedTab !== null) initialTab = parseInt(savedTab);
    } catch(e){}

    renderUnifiedPanel();
    renderTabs(initialTab);
    updateEmptyHudText();
    
    if(activeUnits.size > 0) {
        updateAllPanels();
        renderSelectedArea();
        updateTabDots();
    }

    window.addEventListener('resize', updateEmptyHudText);

    const titles=['개복디 넥서스','DATA MATRIX','SYSTEM ONLINE','ACCESS GRANTED'];
    let titleIdx=0;
    const headerTitleEl=document.getElementById('headerTitle');
    if(headerTitleEl){
        setInterval(()=>{
            titleIdx=(titleIdx+1)%titles.length;
            headerTitleEl.style.animation='none';
            void headerTitleEl.offsetWidth;
            headerTitleEl.innerText=titles[titleIdx];
            headerTitleEl.style.animation='';
        },8000);
    }

    runIntro();
});
