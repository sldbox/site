    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="main-layout" id="mainLayout">
    <header class="site-header">
        <div class="header-content-wrap">
            <div class="animated-title-wrap">
                <div class="title-text text-nexus">개복디 넥서스</div>
                <div class="title-text text-creator">
                    <span style="opacity:0.8; font-family:var(--font-body); font-size:0.95rem;">제작자</span>
                    <span style="color:var(--g-dim); margin:0 8px;">|</span>
                    <span style="letter-spacing:1px; color:var(--g); font-weight:800; text-shadow:0 0 10px var(--g);">회장</span>
                </div>
            </div>
            <div class="hdr-btns">
                <button class="btn-hdr neon-btn" onclick="resetAll()">⟲ 시스템 초기화</button>
                <button class="btn-hdr" onclick="openJewelModal()">✦ 쥬얼 도감</button>
            </div>
        </div>
    </header>

    <div class="hud-panel panel-codex">
        <div class="panel-header" style="flex-direction:column; align-items:stretch; padding:0; background:var(--panel-hdr-bg);">
            <div style="padding:11px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:16px; background:var(--g-faint); position:relative; overflow:hidden;">
                <div class="header-scanline"></div>
                <div style="display:flex; align-items:center; gap:8px; flex-shrink:0; position:relative; z-index:2;">
                    <span class="ph-icon">▤</span><span class="ph-title">유닛도감&조합</span>
                </div>
            </div>
            <div style="display:flex; width:100%; gap:6px; padding:10px; border-bottom:1px solid var(--border); align-items:center;">
                <div class="codex-tabs" id="codexTabs" style="flex:1;"></div>
            </div>
        </div>
        <div class="panel-body">
            <div id="tabContent"></div>
        </div>
    </div>

    <div class="col-center">
        <div class="hud-panel" style="flex: 1 1 auto;">
            <div class="panel-header">
                <span class="ph-icon" style="color:var(--grade-epic); border-color:var(--grade-epic);">❖</span>
                <span class="ph-title" style="color:var(--grade-epic); text-shadow:0 0 10px rgba(251,146,60,0.5);">코스트 데시보드</span>
            </div>
            <div class="panel-body" style="padding:12px;">
                <div class="magic-grid" id="magicDashboard"></div>
            </div>
        </div>
    </div>

    <div class="hud-panel col-right" style="display: flex; flex-direction: column; overflow: hidden; min-height: 0;">
        <div class="panel-header">
            <span class="ph-icon" style="color:var(--grade-unique); border-color:var(--grade-unique);">⊖</span>
            <span class="ph-title" style="color:var(--grade-unique); text-shadow:0 0 10px rgba(239,68,68,0.5);">차감 맵핑</span>
        </div>
        <div class="panel-body" id="deductionBoard" style="padding:16px; overflow-y:auto; background:var(--panel);"></div>
    </div>
</main>

<div class="modal-backdrop" id="jewelModal" onclick="closeJewelModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()" style="width:min(1100px, 95vw); max-height:85vh;">
        <div class="modal-head">
            <h2 style="font-family:'Orbitron', sans-serif;">쥬얼 도감</h2>
            <button class="btn-close" onclick="closeJewelModal()">&times;</button>
        </div>
        <div class="modal-body-scroll" style="background:var(--panel-b);">
            <div id="jewelGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
