<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개복디 넥서스</title>
    <script src="data.js"></script>
    <style>
        /* ===================================================================
           [1] CSS 변수 및 기본 설정
           =================================================================== */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-base: #000000;       
            --bg-panel: #0A0A0A;      
            --bg-panel-hover: #141414;
            --accent: #38BDF8;        
            --accent-glow: rgba(56, 189, 248, 0.3); 
            --text-main: #F8FAFC;     
            --text-sub: #94A3B8;      
            --text-muted: #52525B;    
            --border-light: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(56, 189, 248, 0.5);
            --tree-line: #27272A;
            --font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ===================================================================
           [2] 글로벌 스타일
           =================================================================== */
        body { 
            background-color: var(--bg-base);
            color: var(--text-main); 
            font-family: var(--font-family); 
            margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; 
            letter-spacing: -0.02em;
        }

        .container { 
            width: 100%; max-width: 100%; 
            padding: 20px 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; height: 100%; 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* ===================================================================
           [3] 헤더
           =================================================================== */
        .glass-header {
            display: flex; align-items: center; justify-content: space-between; gap: 30px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 100px; padding: 10px 15px 10px 30px; margin: 0 auto 30px auto; width: fit-content;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8); z-index: 1000;
        }

        .header-brand { display: flex; flex-direction: column; }
        .main-title { 
            color: transparent; background: linear-gradient(90deg, #fff, var(--accent)); 
            -webkit-background-clip: text; background-clip: text;
            margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: 0.5px; 
        }
        .creator-info { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; margin: 2px 0 0 0; }
        
        .btn-toggle-view { 
            background: linear-gradient(180deg, var(--accent), #0284C7); color: #fff; border: none; border-radius: 50px;
            padding: 10px 24px; font-size: 0.95rem; cursor: pointer; font-weight: 700; transition: all 0.3s;
            box-shadow: 0 4px 15px var(--accent-glow); font-family: var(--font-family);
        }
        .btn-toggle-view:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

        /* ===================================================================
           [4] 메인 레이아웃
           =================================================================== */
        .view-section { display: none; width: 100%; flex: 1; min-height: 0; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: grid; grid-template-columns: 1.1fr 1.3fr 1.1fr; gap: 20px; height: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-col { display: flex; flex-direction: column; height: 100%; min-height: 0; gap: 20px; }
        .card-panel {
            background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 20px; 
            padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); 
            display: flex; flex-direction: column; overflow: hidden; height: 100%; min-height: 0; 
        }

        /* ===================================================================
           [5] 검색 및 입력창
           =================================================================== */
        .search-container { position: relative; width: 100%; display: flex; gap: 15px; flex-shrink: 0; }
        .input-wrapper { position: relative; flex: 1; border-radius: 16px; background: var(--bg-base); border: 1px solid var(--border-light); }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        
        .input-overlay-box { 
            width: 100%; height: 70px; box-sizing: border-box; font-size: 1.4rem; font-weight: 700; 
            padding: 0 25px; line-height: 70px; white-space: pre; overflow-x: auto; overflow-y: hidden; 
            border: none; background: transparent; scrollbar-width: none; color: var(--text-main); font-family: var(--font-family);
        }
        #highlightLayer { position: absolute; top: 0; left: 0; z-index: 1; color: var(--text-main); pointer-events: none; }
        #comboInput { position: absolute; top: 0; left: 0; z-index: 2; color: transparent; caret-color: var(--accent); outline: none; }
        
        .btn-reset { 
            background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-light); 
            border-radius: 16px; padding: 0 30px; font-size: 1.1rem; cursor: pointer; font-weight: bold; height: 70px;
        }
        .btn-reset:hover { background: rgba(255, 99, 132, 0.1); color: #FF6B6B; border-color: #FF6B6B; }

        /* ===================================================================
           [6] 매직 대시보드
           =================================================================== */
        .magic-dashboard-container { margin-top: 15px; }
        .magic-dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; flex-shrink: 0; }
        .cost-slot { 
            background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 16px; 
            text-align: center; height: 90px; display: flex; flex-direction: column; justify-content: center; transition: all 0.3s; 
        }
        .cost-slot.active { background: rgba(56, 189, 248, 0.05); border-color: var(--accent); box-shadow: inset 0 0 20px var(--accent-glow); }
        .cost-slot.active .slot-val { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        .slot-val { font-size: 1.8rem; font-weight: 900; color: var(--text-sub); line-height: 1.1; } 
        .slot-name { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-top: 4px; } 

        /* ===================================================================
           [7] 검색 결과
           =================================================================== */
        #searchResultList { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; min-height: 32px; }
        .result-item { 
            background: var(--bg-panel-hover); border: 1px solid var(--border-light); border-radius: 8px;
            padding: 8px 16px; cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: 0.2s;
        }
        .result-item:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* ===================================================================
           [8] 등급 필터
           =================================================================== */
        .quick-tools-panel { margin-top: 15px; border-top: 1px solid var(--border-light); padding-top: 15px; flex-shrink: 0; }
        .quick-tools-header { font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        .grade-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grade-btn {
            background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 8px;
            color: var(--text-sub); font-size: 0.85rem; font-weight: bold; padding: 10px 0; cursor: pointer; text-align: center;
        }
        .grade-btn:hover { background: var(--bg-panel-hover); color: var(--text-main); }

        /* ===================================================================
           [9] 트리뷰
           =================================================================== */
        #treeView { flex: 1; overflow-y: auto; height: 0; padding-right: 5px; }
        
        .analysis-card { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 16px; padding: 15px 20px; margin-bottom: 15px; }
        .analysis-card h3 { margin: 0 0 15px 0; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
        .tree-btn { background: transparent; color: var(--text-sub); border: 1px solid var(--border-light); border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; }
        .tree-btn:hover { background: var(--text-sub); color: var(--bg-base); }
        
        .tree-ul { list-style: none; padding-left: 20px; margin: 8px 0 0 0; border-left: 2px solid var(--tree-line); }
        .tree-ul.root-ul { border-left: none; margin-left: 0; padding-left: 0; }
        .tree-li { position: relative; margin: 10px 0 0 0; }
        .tree-li::before { content: ""; position: absolute; top: 14px; left: -22px; width: 16px; height: 2px; background-color: var(--tree-line); border-radius: 2px; }
        
        .unit-badge { 
            display: inline-flex; align-items: center; background: var(--bg-panel-hover); 
            border: 1px solid var(--border-light); border-radius: 8px; padding: 6px 12px; 
            font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .unit-badge:hover { filter: brightness(1.2); transform: translateX(2px); }
        .toggle-mark { margin-left: 10px; font-size: 0.65rem; color: var(--text-muted); }
        .bullet-recipe { color: var(--text-sub); font-size: 0.85rem; margin: 6px 0 0 5px; padding-left: 10px; }
        .bullet-cost { color: var(--accent); font-size: 0.85rem; margin: 4px 0 0 5px; padding-left: 10px; font-weight: 700; }

        /* ===================================================================
           [10] 테이블
           =================================================================== */
        #tablesContainer { display: flex; flex-direction: column; height: 100%; min-height: 0; }
        .tabs-wrapper { display: flex; background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 12px; padding: 4px; margin-bottom: 15px; flex-shrink: 0; } 
        .tab-btn { 
            flex: 1; background: transparent; border: none; border-radius: 8px; padding: 8px 0; 
            color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--bg-panel); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 1px solid var(--border-light); }
        .tab-btn .unit-count { font-size: 0.75rem; font-weight: 500; opacity: 0.8; margin-top: 2px;} 
        
        .tab-content-area { flex: 1; overflow-y: auto; height: 0; padding-right: 5px; } 
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        tr { background: var(--bg-base); transition: 0.2s; }
        tr:hover { background: var(--bg-panel-hover); transform: scale(1.01); }
        td { padding: 12px 15px; font-size: 0.9rem; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); }
        td:first-child { border-left: 1px solid var(--border-light); border-top-left-radius: 8px; border-bottom-left-radius: 8px; font-weight: 800; width: 35%;}
        td:last-child { border-right: 1px solid var(--border-light); border-top-right-radius: 8px; border-bottom-right-radius: 8px; color: var(--text-sub); }

        /* ===================================================================
           [11] 일일정수 뷰
           =================================================================== */
        #view-essence { flex-direction: column; overflow-y: auto; display: none; gap: 20px; }
        #view-essence.active { display: flex; }
        
        .essence-top-banner { 
            background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 20px; padding: 35px 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px;
        }
        
        .essence-score-master { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; width: 100%; }
        .score-circle { 
            width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border: 2px dashed var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--accent-glow);
        }
        .score-circle span { font-size: 3.5rem; font-weight: 900; color: var(--text-main); line-height: 1; }
        .score-circle label { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-top: 5px; }

        .essence-sub-scores { display: flex; gap: 20px; }
        .sub-score-card { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 16px; padding: 15px 25px; min-width: 130px; text-align: center; }
        .sub-score-card .title { font-size: 0.9rem; color: var(--text-sub); font-weight: 700; margin-bottom: 5px; }
        .sub-score-card .value { font-size: 2rem; font-weight: 900; color: var(--text-main); }
        .sub-score-card .max { font-size: 1rem; color: var(--text-muted); font-weight: 500; }

        .btn-reset-essence { 
            background: rgba(255, 99, 132, 0.1); color: #FF6B6B; border: 1px solid rgba(255, 99, 132, 0.3); 
            border-radius: 12px; padding: 15px 25px; font-size: 1rem; font-weight: 700; cursor: pointer; height: fit-content;
        }
        .btn-reset-essence:hover { background: rgba(255, 99, 132, 0.2); box-shadow: 0 4px 15px rgba(255, 99, 132, 0.2); }

        .essence-guide-text { 
            font-size: 0.9rem; color: var(--text-sub); line-height: 1.7; text-align: center; 
            border-top: 1px solid var(--border-light); padding-top: 20px; width: 100%; max-width: 800px; 
        }
        .essence-guide-text strong { color: var(--accent); }

        .essence-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .essence-group { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 20px; padding: 25px; }
        .essence-group-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 12px; margin-bottom: 15px; }
        .essence-group-title { font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .btn-select-all { background: transparent; color: var(--text-sub); border: 1px solid var(--border-light); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.85rem; }
        .btn-select-all:hover { color: var(--text-main); background: var(--bg-panel-hover); }
        
        .cat-title { font-size: 0.85rem; color: var(--accent); font-weight: 800; margin: 15px 0 8px 0; }
        .unit-check-list { display: flex; flex-direction: column; gap: 8px; }
        .unit-check-btn { 
            background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 10px; 
            padding: 10px 14px; cursor: pointer; font-size: 0.95rem; font-weight: 600; 
            color: var(--text-sub); transition: all 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .unit-check-btn::before {
            content: ''; display: block; width: 16px; height: 16px; border-radius: 4px; 
            border: 2px solid var(--text-muted); transition: 0.2s; background: var(--bg-panel);
        }
        .unit-check-btn:hover { background: var(--bg-panel-hover); color: var(--text-main); }
        .unit-check-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--text-main); }
        .unit-check-btn.active::before { background: var(--accent); border-color: var(--accent); box-shadow: inset 0 0 0 2px var(--bg-panel); }

        /* ===================================================================
           [12] 반응형
           =================================================================== */
        @media (max-width: 1200px) {
            body { height: auto; overflow: visible; }
            .container { padding: 15px; height: auto; }
            .glass-header { width: 100%; border-radius: 20px; box-sizing: border-box; }
            
            .view-section.active { display: flex; flex-direction: column; gap: 20px; height: auto; }
            
            .magic-dashboard { grid-template-columns: repeat(5, 1fr) !important; gap: 6px; }
            .cost-slot { height: 65px; }
            .slot-val { font-size: 1.3rem; }
            .slot-name { font-size: 0.7rem; }
            
            .essence-grid { grid-template-columns: 1fr !important; gap: 15px; }
            .input-overlay-box { height: 60px; font-size: 1.2rem; line-height: 60px; }
            .btn-reset { height: 60px; font-size: 1rem; }
        }

        @media (max-width: 600px) {
            .glass-header { flex-direction: column; padding: 15px 20px; gap: 15px; }
            .essence-score-master { flex-direction: column; gap: 20px; }
            .essence-sub-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
            .sub-score-card { min-width: 0; padding: 10px 5px; }
            .sub-score-card .value { font-size: 1.4rem; }
            .score-circle { width: 110px; height: 110px; }
            .score-circle span { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-header">
        <div class="header-brand">
            <h1 class="main-title">개복디 넥서스</h1>
            <p class="creator-info">제작자 회장 | 핸들값 3-S2-1-2461127</p>
        </div>
        <button id="btn-toggle-view" class="btn-toggle-view" onclick="toggleMainView()">일일정수 전환</button>
    </div>

    <!-- ========== 뷰 1: 히든조합 ========== -->
    <div id="view-combo" class="view-section active">
        <div class="panel-col">
            <div class="card-panel" style="flex:none; height:auto;">
                <div class="search-container">
                    <div class="input-wrapper">
                        <input type="text" id="comboInput" class="input-overlay-box" placeholder="유닛명*수량 (예: 타이커스*8)" autocomplete="off" spellcheck="false">
                        <div id="highlightLayer" class="input-overlay-box"></div>
                    </div>
                    <button class="btn-reset" onclick="resetCombo()">초기화</button>
                </div>
                
                <div class="magic-dashboard-container">
                    <div class="magic-dashboard" id="magicDashboard"></div>
                    <div id="searchResultList"></div>
                </div>

                <div class="quick-tools-panel">
                    <div class="quick-tools-header">빠른 등급 검색 필터</div>
                    <div class="grade-buttons" id="quickGradeButtons"></div>
                </div>
            </div>
        </div>

        <div class="card-panel">
            <div id="treeView"></div>
        </div>

        <div class="card-panel">
            <div id="tablesContainer"></div>
        </div>
    </div>

    <!-- ========== 뷰 2: 일일정수 ========== -->
    <div id="view-essence" class="view-section">
        <div class="essence-top-banner">
            <div class="essence-score-master">
                <div class="score-circle">
                    <span id="essence-total-val">0</span>
                    <label>Total</label>
                </div>
                <div class="essence-sub-scores">
                    <div class="sub-score-card">
                        <div class="title">코랄의 정수</div>
                        <div><span class="value" id="val-coral">0</span><span class="max" id="max-coral">/0</span></div>
                    </div>
                    <div class="sub-score-card">
                        <div class="title">아이어의 정수</div>
                        <div><span class="value" id="val-aiur">0</span><span class="max" id="max-aiur">/0</span></div>
                    </div>
                    <div class="sub-score-card">
                        <div class="title">제루스의 정수</div>
                        <div><span class="value" id="val-zerus">0</span><span class="max" id="max-zerus">/0</span></div>
                    </div>
                </div>
                <button class="btn-reset-essence" onclick="resetAllEssence()">초기화 (전체선택 해제)</button>
            </div>
            
            <div class="essence-guide-text">
                코랄, 아이어, 제루스의 하위유닛은 1회 조합 시 <strong>+1 정수</strong>가 합산됩니다.<br>
                혼종 유닛의 경우 3회 조합 시 3개 정수 전체에 <strong>+1 정수</strong>가 동시 합산됩니다.
            </div>
        </div>

        <div class="essence-grid" id="essenceGroupsContainer"></div>
    </div>
</div>

<script>
// =========================================================================
// [1] 전역 변수 및 초기화
// =========================================================================

const allUnits = [];
const DOM = {};
const clean = (s) => s ? s.replace(/\s+/g, '').toLowerCase() : '';

const essenceMax = { coral: 0, aiur: 0, zerus: 0 };
const essenceUnitsMap = { coral: [], aiur: [], zerus: [], hybrid: [] };
const essenceClickState = {};
let currentView = 1;

function init() {
    // DOM 요소 캐싱
    DOM.tablesContainer = document.getElementById("tablesContainer");
    DOM.magicDashboard = document.getElementById("magicDashboard");
    DOM.searchResultList = document.getElementById("searchResultList");
    DOM.treeView = document.getElementById("treeView");
    DOM.comboInput = document.getElementById("comboInput");
    DOM.highlightLayer = document.getElementById("highlightLayer");
    
    // 이벤트 바인딩
    DOM.comboInput.addEventListener("input", () => { updateHighlight(); debounceSearch(); });
    DOM.comboInput.addEventListener("scroll", () => { DOM.highlightLayer.scrollLeft = DOM.comboInput.scrollLeft; });
    
    // 데이터 로드 및 UI 렌더링
    loadUnits();
    renderDashboardAtoms();
    renderTabs();
    initEssenceData();
    renderQuickFilters();
}

// =========================================================================
// [2] 데이터 로드
// =========================================================================

function loadUnits() {
    allUnitsData.forEach(item => {
        allUnits.push({ 
            ...item, 
            key: clean(item.name),
            sanitizedId: sanitizeId(item.name)
        });
    });
    
    console.log('[✓] 유닛 로드 완료:', allUnits.length, '개');
}

// =========================================================================
// [3] 뷰 전환
// =========================================================================

function toggleMainView() {
    const btn = document.getElementById('btn-toggle-view');
    if (currentView === 1) {
        currentView = 2;
        document.getElementById('view-combo').classList.remove('active');
        document.getElementById('view-essence').classList.add('active');
        btn.innerText = '히든조합 전환';
    } else {
        currentView = 1;
        document.getElementById('view-combo').classList.add('active');
        document.getElementById('view-essence').classList.remove('active');
        btn.innerText = '일일정수 전환';
    }
}

// =========================================================================
// [4] 유틸리티 함수
// =========================================================================

function isLegend(name) { return unitGradeMap["레전드"].some(u => clean(u) === clean(name)); }
function isHidden(name) { return unitGradeMap["히든"].some(u => clean(u) === clean(name)); }
function isSuperHidden(name) { return unitGradeMap["슈퍼히든"].some(u => clean(u) === clean(name)); }

function getUnitColor(name) {
    const cName = clean(name.split(/[(\[▶▼]/)[0]);
    for (const [grade, units] of Object.entries(unitGradeMap)) { 
        if (units.some(u => clean(u) === cName)) return gradeColors[grade]; 
    }
    const unit = allUnits.find(u => u.key === cName);
    return (unit && raceColors[unit.race]) ? raceColors[unit.race] : "var(--text-main)";
}

// [5] 검색 및 하이라이트

function updateHighlight() {
    const val = DOM.comboInput.value; 
    if (!val) { DOM.highlightLayer.innerHTML = ""; return; }
    
    const safeVal = val.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const parts = safeVal.split(/([,\/]+)/);
    const coloredParts = parts.map(part => {
        if (/^[,\/]+$/.test(part)) return `<span style="color:var(--text-muted)">${part}</span>`;
        const subParts = part.split('*');
        let unitName = subParts[0];
        let color = "var(--text-main)";
        
        if (unitName.trim().length > 0) {
            const cleanName = clean(unitName);
            let found = allUnits.find(u => u.key === cleanName || u.key.includes(cleanName));
            if (found) color = getUnitColor(found.name);
        }
        
        subParts[0] = `<span style="color:${color}">${unitName}</span>`;
        return subParts.join('<span style="color:var(--text-muted)">*</span>');
    });
    
    DOM.highlightLayer.innerHTML = coloredParts.join('');
}

// =========================================================================

const debounceSearch = debounce(() => {
    const val = clean(DOM.comboInput.value);
    DOM.searchResultList.innerHTML = "";
    resetMagicDashboard(false);
    
    if (!val) return;
    
    const terms = val.split(/[,\/]/).map(t => t.trim()).filter(t => t !== "");
    const multMap = {};
    const exacts = [];
    
    terms.forEach(raw => {
        let [t, c] = raw.split('*');
        let p = clean(t);
        let found = allUnits.find(u => u.key === p) || allUnits.find(u => u.key.includes(p));
        if(found) { 
            exacts.push(found.key); 
            multMap[found.key] = parseInt(c) || 1; 
        }
    });
    
    // 검색 결과 표시
    allUnits.filter(u => {
        const searchWord = clean(terms[0].split('*')[0]);
        return u.key.includes(searchWord);
    }).slice(0, 15).forEach(u => {
        const d = document.createElement("div");
        d.className = "result-item";
        d.innerText = u.name;
        d.style.color = getUnitColor(u.name);
        d.onclick = () => selectUnitFromAction(u.name);
        DOM.searchResultList.appendChild(d);
    });
    
    if (exacts.length && (val.includes(',') || val.includes('/') || val.includes('*'))) {
        DOM.treeView.innerHTML = "";
        analyzeUnits(exacts, multMap);
    }
}, 200);

function debounce(f, t) { 
    let timer; 
    return (...args) => { 
        clearTimeout(timer); 
        timer = setTimeout(() => f.apply(this, args), t); 
    }; 
}

// =========================================================================
// [8] 유닛 분석
// =========================================================================

function processCostKeyword(rawName, amount, map) {
    let matched = false;
    const cName = clean(rawName);
    
    for (const conf of specialKeywordMap) {
        if (conf.keys.some(k => cName.includes(clean(k)))) {
            const val = conf.divider ? amount / conf.divider : amount;
            if (conf.subKey) { 
                map[conf.atom][conf.subKey] = (map[conf.atom][conf.subKey] || 0) + val; 
            } else { 
                map[conf.atom] = (map[conf.atom] || 0) + val; 
            }
            matched = true; 
            break;
        }
    }
    
    if (!matched) {
        const atom = dashboardAtoms.find(a => clean(a.name) === cName);
        if (atom) { map[atom.name] = (map[atom.name] || 0) + amount; matched = true; }
    }
    
    return matched;
}

function parseFixedCost(costStr, multiplier, map) {
    if (!costStr || costStr === "정보 부족" || costStr === "미발견" || costStr === "없음") return;
    
    const parts = costStr.split(',');
    parts.forEach(p => {
        const match = p.match(/(.+)\[(\d+)\]/);
        if (match) { 
            processCostKeyword(match[1], parseInt(match[2]) * multiplier, map); 
        } else { 
            processCostKeyword(p, multiplier, map); 
        }
    });
}

function calculateRecursiveCost(name, m, map, visited = new Set(), depth = 0) {
    if (depth > MAX_RECURSION_DEPTH) {
        console.warn('[⚠️ 재귀 제한] 최대 깊이 초과:', name);
        return;
    }
    
    const pName = clean(name.split(/[(\[]/)[0]);
    if (visited.has(pName)) {
        console.warn('[⚠️ 순환 참조 감지]:', pName);
        return;
    }
    
    const curV = new Set(visited);
    curV.add(pName);
    
    if (processCostKeyword(pName, m, map)) return;
    
    const u = allUnits.find(x => x.key === pName);
    if (u && u.recipe) {
        u.recipe.split(/[+,]/).forEach(part => {
            const ingMatch = part.match(/([^(\[\]+]+)/);
            if (ingMatch) {
                const ingName = ingMatch[1].trim();
                const cntMatch = part.match(/\[(\d+)\]/);
                const cnt = cntMatch ? parseInt(cntMatch[1]) : 1;
                calculateRecursiveCost(ingName, cnt * m, map, curV, depth + 1);
            }
        });
    }
}

function analyzeUnits(keys, mults = {}) {
    resetMagicDashboard(false);
    const totalMap = {};
    
    dashboardAtoms.forEach(a => {
        if (a.name === "갓오타/메시브") {
            totalMap[a.name] = { 갓오타: 0, 메시브: 0 };
        } else {
            totalMap[a.name] = 0;
        }
    });
    
    keys.forEach(k => {
        const u = allUnits.find(x => x.key === k);
        if(!u) return;
        
        const c = mults[k] || 1;
        
        if (u.cost && u.cost !== "정보 부족" && u.cost !== "미발견" && u.cost !== "없음") {
            parseFixedCost(u.cost, c, totalMap);
        } else {
            calculateRecursiveCost(u.name, c, totalMap);
        }
        
        DOM.treeView.innerHTML += `<div class="analysis-card"><h3><span style="color:${getUnitColor(u.name)};">${u.name}${c>1?' <span style="color:var(--text-sub)">×${c}</span>':''}</span></h3></div>`;
    });
    
    // 대시보드 업데이트
    dashboardAtoms.forEach(a => {
        const val = totalMap[a.name];
        const e = document.getElementById(`val-${a.name}`);
        const container = document.getElementById(`val-container-${a.name}`);
        const nameEl = container.querySelector('.slot-name');
        
        if (a.name === "갓오타/메시브") {
            if (val.갓오타 > 0 || val.메시브 > 0) {
                let html = "";
                if (val.갓오타 > 0) html += `<div style="font-size:0.9rem; color:#F59E0B;">갓오타 ${Math.ceil(val.갓오타)}</div>`;
                if (val.메시브 > 0) html += `<div style="font-size:0.9rem; color:#EF4444; margin-top:2px;">메시브 ${Math.ceil(val.메시브)}</div>`;
                e.innerHTML = html;
                if(nameEl) nameEl.style.display = 'none';
                container.classList.add('active');
            }
        } else if (val > 0) {
            e.innerText = Math.ceil(val);
            if(nameEl) nameEl.style.display = 'block';
            container.classList.add('active');
        }
    });
}

function selectUnitFromAction(name) {
    DOM.comboInput.value = name;
    updateHighlight();
    DOM.searchResultList.innerHTML = "";
    DOM.treeView.innerHTML = "";
    analyzeUnits([clean(name)]);
}

function renderTabs() {
    let h = `<div class="tabs-wrapper">`;
    rawData.forEach((cat, idx) => {

function selectTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        if(i === idx) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    
    let h = `<table><tbody>`;
    rawData[idx].items.forEach((item, i) => {
        h += `<tr onclick="selectUnitFromAction('${item.name}')"><td style="color:${getUnitColor(item.name)}; cursor:pointer;">${i+1}. ${item.name}</td><td>${item.cost}</td></tr>`;
    });
    h += `</tbody></table>`;
    
    const contentArea = document.getElementById('tabContent');
    contentArea.innerHTML = h;
    contentArea.scrollTop = 0;
}

function initEssenceData() {
    essenceUnitsMap.coral = [];
    essenceUnitsMap.aiur = [];
    essenceUnitsMap.zerus = [];
    essenceUnitsMap.hybrid = [];
    
    allUnits.forEach(item => {
        const unitName = item.name;
        essenceClickState[unitName] = false;
        
        let targetGroup = null;
        if (item.category === "테바" || item.category === "테메") targetGroup = "coral";
        else if (item.category === "토바" || item.category === "토메") targetGroup = "aiur";
        else if (item.category === "저그중립") targetGroup = "zerus";
        else if (item.category === "혼종") targetGroup = "hybrid";
        
        if (targetGroup) {
            if (targetGroup !== "hybrid" && isLegend(unitName)) return;
            essenceUnitsMap[targetGroup].push({ name: unitName, category: item.category });
        }
    });
    
    const hybridLength = essenceUnitsMap.hybrid.length;
    ["coral", "aiur", "zerus"].forEach(group => {
        essenceMax[group] = essenceUnitsMap[group].length + hybridLength;
        document.getElementById(`max-${group}`).innerText = `/${essenceMax[group]}`;
    });
    
    renderEssenceGroups();
}

function renderEssenceGroups() {
    const container = document.getElementById('essenceGroupsContainer');
    const groupConfigs = [
        { id: 'coral', title: '코랄', data: essenceUnitsMap.coral },
        { id: 'aiur', title: '아이어', data: essenceUnitsMap.aiur },
        { id: 'zerus', title: '제루스', data: essenceUnitsMap.zerus },
        { id: 'hybrid', title: '혼종', data: essenceUnitsMap.hybrid }
    ];
    
    let html = '';
    
    groupConfigs.forEach(g => {
        const displayStyle = window.innerWidth <= 1200 ? 'none' : 'block';
        const icon = window.innerWidth <= 1200 ? '▼' : '▲';
        
        html += `<div class="essence-group">
            <div class="essence-group-header" onclick="toggleEssenceGroup('${g.id}')" style="cursor:pointer;">
                <h3 class="essence-group-title">${g.title} <span id="es-icon-${g.id}" style="font-size:0.8rem; margin-left:8px;">${icon}</span></h3>
                <button class="btn-select-all" onclick="event.stopPropagation(); toggleAllEssence('${g.id}')">전체선택</button>
            </div>
            <div id="es-content-${g.id}" class="essence-content" style="display:${displayStyle};">`;
        
        const categories = [...new Set(g.data.map(u => u.category))];
        categories.forEach(cat => {
            const catUnits = g.data.filter(u => u.category === cat);
            if(catUnits.length === 0) return;
            
            html += `<div class="cat-title">${cat}</div><div class="unit-check-list">`;
            catUnits.forEach(uObj => {
                const uColor = getUnitColor(uObj.name);
                html += `<div class="unit-check-btn" id="es-btn-${clean(uObj.name)}" onclick="toggleEssence('${uObj.name}')"><span style="color:${uColor}; font-weight:800;">${uObj.name}</span></div>`;
            });
            html += `</div>`;
        });
        
        html += `</div></div>`;
    });
    
    container.innerHTML = html;
    updateEssenceCalculation();
}

function toggleEssenceGroup(groupId) {
    const content = document.getElementById(`es-content-${groupId}`);
    const icon = document.getElementById(`es-icon-${groupId}`);
    
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.innerText = '▲';
    } else {
        content.style.display = 'none';
        icon.innerText = '▼';
    }
}

function toggleAllEssence(groupId) {
    const units = essenceUnitsMap[groupId];
    const allSelected = units.every(u => essenceClickState[u.name]);
    const newState = !allSelected;
    
    units.forEach(u => {
        essenceClickState[u.name] = newState;
        const btn = document.getElementById(`es-btn-${clean(u.name)}`);
        if (btn) {
            if(newState) btn.classList.add('active');
            else btn.classList.remove('active');
        }
    });
    
    updateEssenceCalculation();
}

function toggleEssence(unitName) {
    essenceClickState[unitName] = !essenceClickState[unitName];
    const btn = document.getElementById(`es-btn-${clean(unitName)}`);
    
    if(essenceClickState[unitName]) btn.classList.add('active');
    else btn.classList.remove('active');
    
    updateEssenceCalculation();
}

function resetAllEssence() {
    for (let key in essenceClickState) {
        if (essenceClickState.hasOwnProperty(key)) {
            essenceClickState[key] = false;
            const btn = document.getElementById(`es-btn-${clean(key)}`);
            if (btn) btn.classList.remove('active');
        }
    }
    updateEssenceCalculation();
}

function updateEssenceCalculation() {
    let baseCounts = { coral: 0, aiur: 0, zerus: 0, hybrid: 0 };
    
    essenceUnitsMap.coral.forEach(u => { if(essenceClickState[u.name]) baseCounts.coral++; });
    essenceUnitsMap.aiur.forEach(u => { if(essenceClickState[u.name]) baseCounts.aiur++; });
    essenceUnitsMap.zerus.forEach(u => { if(essenceClickState[u.name]) baseCounts.zerus++; });
    essenceUnitsMap.hybrid.forEach(u => { if(essenceClickState[u.name]) baseCounts.hybrid++; });
    
    const actualCoral = baseCounts.coral + baseCounts.hybrid;
    const actualAiur = baseCounts.aiur + baseCounts.hybrid;
    const actualZerus = baseCounts.zerus + baseCounts.hybrid;
    
    document.getElementById('val-coral').innerText = actualCoral;
    document.getElementById('val-aiur').innerText = actualAiur;
    document.getElementById('val-zerus').innerText = actualZerus;
    document.getElementById('essence-total-val').innerText = actualCoral + actualAiur + actualZerus;
}
