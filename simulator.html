<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시뮬레이터</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --line: #d8e1ee;
      --text: #172033;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(110px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
      z-index: 5;
    }

    .title {
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
      justify-self: start;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
    }

    button {
      height: 32px;
      border: 0;
      border-radius: 9px;
      padding: 0 11px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }

    button:hover {
      background: #eef4ff;
      color: var(--text);
    }

    button.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 5px 14px rgba(37, 99, 235, 0.20);
    }

    .info {
      min-width: 240px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .info strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .viewport {
      position: relative;
      flex: 1;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px),
        linear-gradient(0deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .viewport.actual {
      overflow: auto;
    }

    .device {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: #0f172a;
      border-radius: 18px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.12);
      opacity: 0;
      transform-origin: center;
      transition: width 0.18s ease, height 0.18s ease, transform 0.18s ease;
    }

    .viewport.actual .device {
      position: relative;
      left: auto;
      top: auto;
      margin: 28px auto;
      transform: none;
    }

    .device.mobile {
      border-radius: 30px;
      padding: 12px 9px;
    }

    .device.tablet {
      border-radius: 24px;
    }

    .screen {
      flex: 1;
      overflow: hidden;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.35);
    }

    .device.mobile .screen {
      border-radius: 21px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .badge {
      position: absolute;
      right: 14px;
      bottom: 12px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.10);
    }

    .badge strong {
      color: var(--text);
    }

    @media (max-width: 1180px) {
      .toolbar {
        grid-template-columns: 1fr;
        gap: 7px;
        min-height: 112px;
      }
      .title {
        justify-self: center;
      }
      .controls {
        width: 100%;
        flex-wrap: wrap;
      }
      .status {
        justify-content: center;
        width: 100%;
      }
      .info {
        min-width: 220px;
      }
    }

    @media (max-width: 560px) {
      .toolbar { gap: 6px; padding: 7px; }
      .controls { gap: 5px; }
      .status { gap: 5px; }
      .group { gap: 2px; padding: 2px; }
      button { height: 30px; padding: 0 8px; font-size: 12px; }
      .info { min-width: 0; flex: 1; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title">시뮬레이터</div>

    <div class="controls" aria-label="시뮬레이터 조작부">
      <div class="group" id="presetBtns" aria-label="해상도 선택">
        <button class="active" data-preset="fhd">FHD</button>
        <button data-preset="qhd">2K</button>
        <button data-preset="uhd">4K</button>
        <button data-preset="laptop">노트북</button>
        <button data-preset="tablet">태블릿</button>
        <button data-preset="mobile">모바일</button>
      </div>

      <div class="group" id="directionBtns" aria-label="방향 선택">
        <button class="active" data-direction="landscape">가로</button>
        <button data-direction="portrait">세로</button>
      </div>

      <div class="group" id="viewBtns" aria-label="보기 방식">
        <button class="active" data-view="fit">비율맞춤</button>
        <button data-view="actual">실크기</button>
      </div>
    </div>

    <div class="status">
      <div class="info">
        <strong id="sizeText">1920×1080</strong>
        <span id="nameText">FHD 가로</span>
      </div>

      <div class="group" aria-label="새로고침">
        <button id="reloadBtn">새로고침</button>
      </div>
    </div>
  </div>

  <main class="viewport" id="viewport">
    <section class="device" id="device" aria-label="미리보기 기기">
      <div class="screen">
        <iframe id="frame" src="index.html"></iframe>
      </div>
    </section>
  </main>

  <div class="badge">배율 <strong id="scaleText">100%</strong></div>

  <script>
    (() => {
      const PRESETS = {
        fhd:     { name: 'FHD',    width: 1920, height: 1080, className: 'pc' },
        qhd:     { name: '2K',     width: 2560, height: 1440, className: 'pc' },
        uhd:     { name: '4K',     width: 3840, height: 2160, className: 'pc' },
        laptop:  { name: '노트북', width: 1440, height: 900,  className: 'laptop' },
        tablet:  { name: '태블릿', width: 820,  height: 1180, className: 'tablet' },
        mobile:  { name: '모바일', width: 390,  height: 844,  className: 'mobile' }
      };

      const viewport = document.getElementById('viewport');
      const device = document.getElementById('device');
      const frame = document.getElementById('frame');
      const sizeText = document.getElementById('sizeText');
      const nameText = document.getElementById('nameText');
      const scaleText = document.getElementById('scaleText');

      let presetKey = 'fhd';
      let direction = 'landscape';
      let viewMode = 'fit';
      let currentWidth = 1920;
      let currentHeight = 1080;

      function setActive(containerId, attr, value) {
        document.querySelectorAll(`#${containerId} button`).forEach(btn => {
          btn.classList.toggle('active', btn.dataset[attr] === value);
        });
      }

      function getSize() {
        const preset = PRESETS[presetKey];
        const wide = Math.max(preset.width, preset.height);
        const tall = Math.min(preset.width, preset.height);
        return direction === 'landscape'
          ? { width: wide, height: tall }
          : { width: tall, height: wide };
      }

      function updateScale() {
        if (viewMode === 'actual') {
          viewport.classList.add('actual');
          device.style.transform = 'none';
          scaleText.textContent = '100%';
          return;
        }

        viewport.classList.remove('actual');
        const pad = 28;
        const fitWidth = Math.max(80, viewport.clientWidth - pad) / (currentWidth + 20);
        const fitHeight = Math.max(80, viewport.clientHeight - pad) / (currentHeight + 20);
        const scale = Math.min(1, Math.max(0.05, Math.min(fitWidth, fitHeight)));

        device.style.transform = `translate(-50%, -50%) scale(${scale})`;
        scaleText.textContent = `${Math.round(scale * 100)}%`;
      }

      function render() {
        const preset = PRESETS[presetKey];
        const size = getSize();
        currentWidth = size.width;
        currentHeight = size.height;

        device.className = `device ${preset.className}`;
        device.style.width = `${currentWidth + 20}px`;
        device.style.height = `${currentHeight + 20}px`;
        device.style.opacity = '1';

        sizeText.textContent = `${currentWidth}×${currentHeight}`;
        nameText.textContent = `${preset.name} ${direction === 'landscape' ? '가로' : '세로'}`;

        setActive('presetBtns', 'preset', presetKey);
        setActive('directionBtns', 'direction', direction);
        setActive('viewBtns', 'view', viewMode);
        updateScale();
      }

      document.getElementById('presetBtns').addEventListener('click', event => {
        const btn = event.target.closest('button[data-preset]');
        if (!btn) return;
        presetKey = btn.dataset.preset;
        render();
      });

      document.getElementById('directionBtns').addEventListener('click', event => {
        const btn = event.target.closest('button[data-direction]');
        if (!btn) return;
        direction = btn.dataset.direction;
        render();
      });

      document.getElementById('viewBtns').addEventListener('click', event => {
        const btn = event.target.closest('button[data-view]');
        if (!btn) return;
        viewMode = btn.dataset.view;
        render();
      });

      document.getElementById('reloadBtn').addEventListener('click', () => {
        frame.src = `index.html?t=${Date.now()}`;
      });

      window.addEventListener('resize', updateScale);
      render();
    })();
  </script>
</body>
</html>
